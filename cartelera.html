<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cartelera - Moisés Vaca Ríos</title>

<!-- Bootstrap (estilos listos) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Waves (efecto tipo gota/onda al hover/click) -->
<link rel="stylesheet" href="https://unpkg.com/node-waves@0.7.6/dist/waves.min.css">

</head>

<body class="bg-dark text-white">

<!-- NAVBAR Bootstrap (ya listo, sin CSS nuestro) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Cartelera</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="sobre-mi.html">Sobre mí</a></li>
        <li class="nav-item"><a class="nav-link active" href="cartelera.html">Cartelera</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">

  <div class="p-4 rounded bg-black border border-secondary">
    <h1 class="h3 mb-2">Mis 3 películas favoritas</h1>
    <p class="mb-0 text-secondary">Carrusel automático cada 3 segundos (tipo cine).</p>
  </div>

  <!-- CAROUSEL Bootstrap -->
  <div id="miCarrusel" class="carousel slide mt-4" data-bs-ride="carousel" data-bs-interval="3000">
    
    <!-- indicadores -->
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="2"></button>
    </div>

    <!-- slides -->
    <div class="carousel-inner rounded overflow-hidden">

      <div class="carousel-item active">
        <img class="d-block w-100" style="height:420px; object-fit:cover;"
          src="/imagenes/interstellar.webp"
          alt="Película 1">
        <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-75 rounded p-2 waves-effect">
          <h5 class="mb-1">Interstellar</h5>
          <p class="mb-0">Ciencia ficción • Viajes espaciales</p>
        </div>
      </div>

      <div class="carousel-item">
        <img class="d-block w-100" style="height:420px; object-fit:cover;"
          src="/imagenes/jhon_wick.webp"
          alt="Película 2">
        <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-75 rounded p-2 waves-effect">
          <h5 class="mb-1">John Wick</h5>
          <p class="mb-0">Acción • Suspenso</p>
        </div>
      </div>

      <div class="carousel-item">
        <img class="d-block w-100" style="height:420px; object-fit:cover;"
          src="/imagenes/spiderman.jpg"
          alt="Película 3">
        <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-75 rounded p-2 waves-effect">
          <h5 class="mb-1">Spider-Man</h5>
          <p class="mb-0">Aventura • Superhéroes</p>
        </div>
      </div>

    </div>

    <!-- controles -->
    <button class="carousel-control-prev" type="button" data-bs-target="#miCarrusel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
      <span class="visually-hidden">Anterior</span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#miCarrusel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
      <span class="visually-hidden">Siguiente</span>
    </button>
  </div>

  <div class="mt-4 text-center text-secondary">
    <p class="mb-0">&copy; 2026 - Moisés Vaca Ríos</p>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Waves JS -->
<script src="https://unpkg.com/node-waves@0.7.6/dist/waves.min.js"></script>
<script>
  // Activa el efecto de "onda/gota" en elementos con clase waves-effect
  Waves.init();
  Waves.attach('.waves-effect', ['waves-light']);
</script>

</body>
</html>
